name: Notification nouvel article

on:
  push:
    branches:
      - main
    paths:
      - 'articles/*.json'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Détecter le nouvel article
        id: detect
        run: |
          # Trouver les fichiers JSON ajoutés dans articles/
          NEW_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'articles/*.json' | grep -v 'index.json' | grep -v 'articles-meta.json' | head -1)
          echo "file=$NEW_FILE" >> $GITHUB_OUTPUT
          echo "Nouvel article détecté : $NEW_FILE"

      - name: Lire les métadonnées de l'article
        id: meta
        if: steps.detect.outputs.file != ''
        run: |
          FILE="${{ steps.detect.outputs.file }}"
          TITRE=$(cat "$FILE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('titre','Nouvel article'))")
          RESUME=$(cat "$FILE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('resume','')[:100])")
          CATEGORIE=$(cat "$FILE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('categorie','').upper())")
          ID=$(basename "$FILE" .json)
          echo "titre=$TITRE" >> $GITHUB_OUTPUT
          echo "resume=$RESUME" >> $GITHUB_OUTPUT
          echo "categorie=$CATEGORIE" >> $GITHUB_OUTPUT
          echo "id=$ID" >> $GITHUB_OUTPUT
          echo "Titre: $TITRE"
          echo "Résumé: $RESUME"

      - name: Envoyer la notification OneSignal
        if: steps.detect.outputs.file != ''
        run: |
          curl -X POST "https://onesignal.com/api/v1/notifications" \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "app_id": "0c76687d-4d05-4bf3-b28a-195db2a67c67",
              "included_segments": ["Total Subscriptions"],
              "headings": {"fr": "Anthropotech — ${{ steps.meta.outputs.categorie }}"},
              "contents": {"fr": "${{ steps.meta.outputs.titre }}"},
              "subtitle": {"fr": "${{ steps.meta.outputs.resume }}"},
              "url": "https://shamsetdean.github.io/Anthropotech/#${{ steps.meta.outputs.id }}",
              "web_push_topic": "new-article",
              "priority": 10
            }'
