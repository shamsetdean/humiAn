name: HumiAn LinkedIn Suggest

on:
  schedule:
    # Mardi, Mercredi, Jeudi a 9h00 Paris (= 8h00 UTC en heure d'hiver, 7h00 UTC en ete)
    # On choisit 7h00 UTC pour viser 9h00 heure de Paris en ete.
    # Ajuster a 8h00 UTC pour l'heure d'hiver si besoin.
    - cron: '0 7 * * 2,3,4'
  workflow_dispatch: # Permet de declencher manuellement depuis l'onglet Actions

jobs:
  suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessaire pour commit l'historique

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run LinkedIn post generator
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python scripts/generate_linkedin_post.py

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications-history.json
          if git diff --staged --quiet; then
            echo "Aucune modification de l'historique."
          else
            git commit -m "chore: maj historique publications LinkedIn [skip ci]"
            git push
          fi
